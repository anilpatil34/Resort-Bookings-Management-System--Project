<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Serene Haven Resort - Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'resortapp:home' %}">Serene Haven Resort</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbars">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbars">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="{% url 'resortapp:home' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'resortapp:add_customer' %}">Add Customer</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'resortapp:add_room' %}">Add Room</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'resortapp:checkin' %}">Check-In</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'resortapp:checkout' %}">Check-Out</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">View</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="{% url 'resortapp:customers_list' %}">Customers</a></li>
            <li><a class="dropdown-item" href="{% url 'resortapp:rooms_list' %}">Rooms</a></li>
          </ul>
        </li>
        <li class="nav-item"><a class="nav-link" href="{% url 'resortapp:search' %}">Search</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'resortapp:billing_report' %}">Billing Report</a></li>
      </ul>
      <form class="d-flex" method="get" action="{% url 'resortapp:search' %}">
        <input class="form-control me-2" type="search" placeholder="Search" name="q" value="{{ request.GET.q }}">
        <button class="btn btn-outline-light" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>

<div class="container my-4">
  {% if messages %}
    {% for message in messages %}
      <div class="alert {% if message.tags %}alert-{{ message.tags }}{% else %}alert-info{% endif %} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
