{% extends "resortapp/base.html" %}
{% block content %}
<h2>Check-Out Customer</h2>
<form method="POST" class="row g-3">
  {% csrf_token %}
  <div class="col-md-4">
    <label class="form-label">Booking ID</label>
    <input type="number" name="booking_id" class="form-control" required>
  </div>
  <div class="col-12">
    <button class="btn btn-warning" type="submit">Check-Out</button>
  </div>
</form>
{% endblock %}
